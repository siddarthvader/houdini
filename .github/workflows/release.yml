name: Release

# Trigger releases on pushes to release branches
# Supports both regular releases and prereleases based on .changeset/pre.json
on:
    push:
        branches:
            - houdini-2.0
            - go
            - main

permissions:
  id-token: write  # Required for OIDC
  contents: read

env:
    CI: true
jobs:
    publish:
        name: Publish Release Version
        runs-on: ubuntu-22.04
        steps:
            - name: Creating .npmrc
              run: |
                  cat << EOF > "$HOME/.npmrc"
                      email=$NPM_EMAIL
                      name=$NPM_NAME
                      //registry.npmjs.org/:_authToken=$NPM_TOKEN
                  EOF
              env:
                  NPM_EMAIL: ${{ secrets.NPM_EMAIL }}
                  NPM_NAME: ${{ secrets.NPM_NAME }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Checkout source
              uses: actions/checkout@master
              with:
                  ref: ${{ github.ref }}

            - name: Install Node.js
              uses: actions/setup-node@v4
              with:
                node-version: 24
                registry-url: 'https://registry.npmjs.org'

            - uses: pnpm/action-setup@v2.0.1
              name: Install pnpm
              id: pnpm-install
              with:
                version: 9

            - name: Install dependencies
              run: pnpm install

            - name: Set Git Identity
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/$GITHUB_REPOSITORY
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Check if we're in prerelease mode
            - name: Check prerelease mode
              id: prerelease-check
              run: |
                  if [ -f ".changeset/pre.json" ]; then
                    echo "✅ Prerelease mode detected (.changeset/pre.json exists)"
                    echo "📝 Will use prerelease titles and skip snapshot releases"
                    echo "is_prerelease=true" >> $GITHUB_OUTPUT
                    echo "title=🚧 Prerelease Version Update" >> $GITHUB_OUTPUT
                    echo "commit=🚧 v{VERSION}" >> $GITHUB_OUTPUT
                  else
                    echo "✅ Regular release mode detected (no .changeset/pre.json)"
                    echo "📝 Will use regular titles and publish snapshot releases"
                    echo "is_prerelease=false" >> $GITHUB_OUTPUT
                    echo "title=📦 Release Version Update" >> $GITHUB_OUTPUT
                    echo "commit=📦 v{VERSION}" >> $GITHUB_OUTPUT
                  fi

            # Per-commit snapshot release - only runs when NOT in prerelease mode
            - name: Publish per-commit snapshot release
              if: steps.prerelease-check.outputs.is_prerelease == 'false'
              run: |
                  # Generate unique snapshot version based on commit
                  COMMIT_SHA=$(git rev-parse --short HEAD)
                  SNAPSHOT_TAG="commit-${COMMIT_SHA}"
                  echo "Publishing snapshot release with tag: $SNAPSHOT_TAG"

                  # Create a clean working directory for snapshot
                  git stash --include-untracked || true

                  # Apply snapshot version to all packages
                  pnpm changeset version --snapshot $SNAPSHOT_TAG

                  # Build all packages
                  pnpm run build

                  # Publish snapshot without git tags
                  pnpm changeset publish --no-git-tag --snapshot --tag $SNAPSHOT_TAG

                  # Restore working directory
                  git reset --hard HEAD
                  git stash pop || true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            # Regular changesets release workflow - creates PR or publishes when PR is merged
            - name: Create Release Pull Request or Publish to Registry
              uses: changesets/action@v1
              with:
                  version: pnpm run version
                  publish: pnpm run release
                  title: ${{ steps.prerelease-check.outputs.title }}
                  commit: ${{ steps.prerelease-check.outputs.commit }}
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
